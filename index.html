<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>touchgra$$ — dense bloom field</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            touch-action: none;
        }

        body {
            min-height: 100vh;
            background: #17632c;
            overflow-x: hidden;
            font-family: 'Fira Mono', 'Courier New', 'SF Mono', monospace;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            z-index: 1;
            pointer-events: auto;
            touch-action: none;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
</head>
<body>
<script>
(function(){
    // ============================================================
    //  DENSE BLOOM FIELD — "touchgra$$" repeated, no spaces
    //  water ripple bloom + shuffled colors on each click
    // ============================================================

    // ----- CONFIGURATION -----------------------------------------
    const BGCOLOR = [23, 195, 50];
    // NO SPACES — continuous string
    const BASE_WORD = "touchgra$$";
    // We'll repeat it to create a very long phrase for the grid
    // so that the pattern feels endless and organic
    const REPEAT_COUNT = 30;   // creates "touchgra$$touchgra$$..." x30 = long string
    const TEXT_PHRASE = BASE_WORD.repeat(REPEAT_COUNT);
    
    const BLOOM_THRESHOLD = 480;
    const MAX_GROWTH = 1000;
    const MIN_GROWTH = 1;
    
    // RIPPLE PHYSICS
    const RIPPLE_MAX_RADIUS = 430;
    const RIPPLE_DURATION_MS = 680;
    const RIPPLE_WIDTH = 62;
    const RIPPLE_STRENGTH = 8200;
    
    // NATURAL DECAY
    const DECAY_FACTOR = 0.972;
    
    // GRID — tighter packing to remove visual gaps
    const GRID_CELL_SIZE = 140;
    // letter spacing multiplier (smaller = denser)
    const LETTER_SPACING_FACTOR = 0.92;   // makes letters closer horizontally
    const LINE_HEIGHT_FACTOR = 0.88;      // reduces vertical gaps
    
    // ----- ORIGINAL COLOR PALETTE (shuffled on click) ----------
    const ORIGINAL_PALETTE = {
        't': [119, 239, 255],
        'o': [255, 187, 194],
        'u': [255, 170, 40],
        'c': [242, 18, 0],
        'h': [221, 255, 123],
        'g': [255, 255, 220],
        'r': [255, 229, 0],
        'a': [138, 97, 255],
        '$': [255, 110, 30],
        's': [227, 192, 255],
        // we still include a fallback for any unexpected char, but now no spaces
    };
    
    // ----- GLOBAL STATE ------------------------------------------
    let letters = [];
    let gridCells = new Map();
    let baseGreen;
    let flowerColors = {};
    let fontMain = 'monospace';
    let cols, rows, cellW, cellH;
    let activeRipples = [];
    
    // ----- SHUFFLE EXISTING COLORS ------------------------------
    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }
    
    function randomizeColorAssignments() {
        const chars = Object.keys(ORIGINAL_PALETTE);
        const colorValues = chars.map(ch => ORIGINAL_PALETTE[ch]);
        const shuffledColors = shuffleArray([...colorValues]);
        for (let i = 0; i < chars.length; i++) {
            const ch = chars[i];
            const rgb = shuffledColors[i];
            flowerColors[ch] = color(rgb[0], rgb[1], rgb[2]);
        }
    }
    
    // ----- SPATIAL GRID (fast radius queries) --------------------
    function rebuildSpatialGrid() {
        gridCells.clear();
        for (let i = 0; i < letters.length; i++) {
            const l = letters[i];
            const cellX = Math.floor(l.x / GRID_CELL_SIZE);
            const cellY = Math.floor(l.y / GRID_CELL_SIZE);
            const key = `${cellX}:${cellY}`;
            if (!gridCells.has(key)) gridCells.set(key, []);
            gridCells.get(key).push(i);
        }
    }
    
    function getCandidateIndices(centerX, centerY, radius) {
        const minCellX = Math.floor((centerX - radius) / GRID_CELL_SIZE);
        const maxCellX = Math.floor((centerX + radius) / GRID_CELL_SIZE);
        const minCellY = Math.floor((centerY - radius) / GRID_CELL_SIZE);
        const maxCellY = Math.floor((centerY + radius) / GRID_CELL_SIZE);
        const candidates = new Set();
        for (let cx = minCellX; cx <= maxCellX; cx++) {
            for (let cy = minCellY; cy <= maxCellY; cy++) {
                const key = `${cx}:${cy}`;
                const indices = gridCells.get(key);
                if (indices) {
                    for (let idx of indices) candidates.add(idx);
                }
            }
        }
        return candidates;
    }
    
    // ----- DENSE LETTER GRID (no gaps, overwhelming amount) ------
    function generateLetterGrid() {
        letters = [];
        textFont(fontMain);
        textSize(32);
        
        // measure a reference character to compute tighter spacing
        const sampleW = textWidth("W") * LETTER_SPACING_FACTOR;
        const sampleH = (textAscent() + textDescent()) * LINE_HEIGHT_FACTOR;
        
        // calculate how many columns and rows can fit with dense packing
        cols = Math.floor(width / sampleW);
        rows = Math.floor(height / sampleH);
        // ensure at least a dense field (minimum 20 columns for that "overwhelming" look)
        if (cols < 24) cols = 24;
        if (rows < 18) rows = 18;
        
        cellW = width / cols;
        cellH = height / rows;
        
        // create a very long repeating pattern from TEXT_PHRASE (which is "touchgra$$" repeated 30x)
        let fullPattern = TEXT_PHRASE;
        // make it even longer if needed to cover all cells without repeating too obviously
        while (fullPattern.length < cols * rows) {
            fullPattern += BASE_WORD;
        }
        
        let idx = 0;
        for (let row = 0; row < rows; row++) {
            for (let col = 0; col < cols; col++) {
                const ch = fullPattern[idx % fullPattern.length];
                idx++;
                // center each letter in its cell
                const x = col * cellW + cellW * 0.5;
                const y = row * cellH + cellH * 0.5;
                letters.push({
                    char: ch,
                    x: x, y: y,
                    growth: MIN_GROWTH
                });
            }
        }
        rebuildSpatialGrid();
    }
    
    // ----- COLOR BLENDING (grass → flower) -----------------------
    function getBlendedColor(growth, char) {
        if (growth <= BLOOM_THRESHOLD) return baseGreen;
        let t = (growth - BLOOM_THRESHOLD) / (MAX_GROWTH - BLOOM_THRESHOLD);
        t = Math.min(1, Math.max(0, t));
        // fallback to a default bright color if character missing (should not happen)
        const flower = flowerColors[char] || flowerColors['$'] || color(255, 200, 100);
        return lerpColor(baseGreen, flower, t);
    }
    
    // ----- RIPPLE BOOST (expanding ring) -------------------------
    function applyRippleBoost(ripple, nowMs) {
        const elapsed = (nowMs - ripple.startTime) / RIPPLE_DURATION_MS;
        if (elapsed >= 1.0) return false;
        
        const currentRadius = RIPPLE_MAX_RADIUS * elapsed;
        const timeFactor = 1.0 - elapsed;
        const maxCheckRadius = RIPPLE_MAX_RADIUS + RIPPLE_WIDTH;
        const candidates = getCandidateIndices(ripple.x, ripple.y, maxCheckRadius);
        
        for (let idx of candidates) {
            const l = letters[idx];
            const dx = l.x - ripple.x;
            const dy = l.y - ripple.y;
            const dist = Math.hypot(dx, dy);
            const distToRing = Math.abs(dist - currentRadius);
            if (distToRing < RIPPLE_WIDTH) {
                const ringFactor = 1.0 - (distToRing / RIPPLE_WIDTH);
                let intensity = RIPPLE_STRENGTH * ringFactor * timeFactor;
                if (intensity > 0) {
                    let newGrowth = Math.min(l.growth + intensity, MAX_GROWTH);
                    l.growth = newGrowth;
                }
            }
        }
        return true;
    }
    
    // ----- NATURAL DECAY (de‑bloom) ------------------------------
    function decayAllLetters() {
        for (let i = 0; i < letters.length; i++) {
            let ng = letters[i].growth * DECAY_FACTOR;
            if (ng < MIN_GROWTH) ng = MIN_GROWTH;
            letters[i].growth = ng;
        }
    }
    
    // ----- ADD NEW RIPPLE + SHUFFLE COLORS -----------------------
    function addBloomRipple(x, y) {
        randomizeColorAssignments();  // shuffle existing colors
        activeRipples.push({
            x: x,
            y: y,
            startTime: millis()
        });
        if (activeRipples.length > 20) activeRipples.shift();
    }
    
    // ----- UPDATE ALL RIPPLES & DECAY ---------------------------
    function updateBlooms() {
        const now = millis();
        for (let i = activeRipples.length-1; i >= 0; i--) {
            const stillActive = applyRippleBoost(activeRipples[i], now);
            if (!stillActive) activeRipples.splice(i,1);
        }
        decayAllLetters();
    }
    
    // ----- DRAW THE DENSE FIELD ----------------------------------
    function drawLetters() {
        textFont(fontMain);
        textAlign(CENTER, CENTER);
        for (let letter of letters) {
            const growth = letter.growth;
            let scaleFactor = map(growth, MIN_GROWTH, MAX_GROWTH, 0.76, 1.42);
            const col = getBlendedColor(growth, letter.char);
            fill(col);
            noStroke();
            push();
            translate(letter.x, letter.y);
            scale(scaleFactor);
            textSize(32);
            text(letter.char, 0, 0);
            pop();
        }
    }
    
    // ----- RESIZE HANDLER ----------------------------------------
    function resizeMeadow() {
        resizeCanvas(windowWidth, windowHeight);
        background(BGCOLOR[0], BGCOLOR[1], BGCOLOR[2]);
        generateLetterGrid();
        activeRipples = [];
    }
    
    // ========== P5.JS SETUP ======================================
    function setup() {
        const canvas = createCanvas(windowWidth, windowHeight);
        canvas.style('position', 'fixed').style('top', '0').style('left', '0').style('z-index', '1');
        canvas.style('touch-action', 'none');
        pixelDensity(1);
        
        fontMain = 'monospace';
        textFont(fontMain);
        
        baseGreen = color(41, 157, 0);
        
        // initial shuffle of original colors
        randomizeColorAssignments();
        
        generateLetterGrid();
        frameRate(60);
    }
    
    function draw() {
        background(BGCOLOR[0], BGCOLOR[1], BGCOLOR[2]);
        updateBlooms();
        drawLetters();
    }
    
    // ----- EVENT HANDLERS ----------------------------------------
    function mousePressed() {
        if (mouseX >= 0 && mouseX <= width && mouseY >= 0 && mouseY <= height) {
            addBloomRipple(mouseX, mouseY);
        }
        return false;
    }
    
    function touchStarted() {
        for (let t of touches) {
            if (t.x >= 0 && t.x <= width && t.y >= 0 && t.y <= height) {
                addBloomRipple(t.x, t.y);
            }
        }
        return false;
    }
    
    function windowResized() {
        resizeMeadow();
    }
    
    window.setup = setup;
    window.draw = draw;
    window.windowResized = windowResized;
    window.mousePressed = mousePressed;
    window.touchStarted = touchStarted;
    
    document.addEventListener('contextmenu', (e) => {
        if (e.target.tagName === 'CANVAS') e.preventDefault();
    });
})();
</script>
</body>
</html>
