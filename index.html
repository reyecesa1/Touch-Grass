<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>touch gra$$ — click to bloom</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: #17632c;
            overflow-x: hidden;
            font-family: 'Fira Mono', 'Courier New', 'SF Mono', monospace;
            font-weight: 400;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            z-index: 1;
            pointer-events: auto;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
</head>
<body>
    <script>
        (function(){
            // ============ CLICK‑ONLY BLOOM MEADOW ============
            // bloom only while mouse/touch is held down → de‑bloom immediately on release
            
            const BGCOLOR = [23, 195, 50];
            const TEXT_PHRASE = "touch gra$$ ";
            const BLOOM_THRESHOLD = 480;
            const INFLUENCE_RADIUS = 400;
            const GRID_CELL_SIZE = 150;
            const DECAY_FACTOR = 0.96;
            const MAX_GROWTH = 1000;
            const MIN_GROWTH = 1;
            
            let letters = [];
            let gridCells = new Map();
            let baseGreen;
            let flowerColors = {};
            let fontMain;
            let cols, rows, cellW, cellH;
            
            function rebuildSpatialGrid() {
                gridCells.clear();
                for (let i = 0; i < letters.length; i++) {
                    const l = letters[i];
                    const cellX = Math.floor(l.x / GRID_CELL_SIZE);
                    const cellY = Math.floor(l.y / GRID_CELL_SIZE);
                    const key = `${cellX}:${cellY}`;
                    if (!gridCells.has(key)) gridCells.set(key, []);
                    gridCells.get(key).push(i);
                }
            }
            
            function generateLetterGrid() {
                letters = [];
                textFont(fontMain);
                textSize(32);
                const sampleW = textWidth("W");
                const sampleH = textAscent() + textDescent();
                
                const targetLetterWidth = sampleW * 1.2;
                const targetLetterHeight = sampleH * 1.3;
                
                cols = Math.floor(width / targetLetterWidth);
                rows = Math.floor(height / targetLetterHeight);
                if (cols < 8) cols = 8;
                if (rows < 5) rows = 5;
                
                cellW = width / cols;
                cellH = height / rows;
                
                let phraseLen = TEXT_PHRASE.length;
                let idx = 0;
                for (let row = 0; row < rows; row++) {
                    for (let col = 0; col < cols; col++) {
                        const ch = TEXT_PHRASE[idx % phraseLen];
                        idx++;
                        const x = col * cellW + cellW * 0.5;
                        const y = row * cellH + cellH * 0.5;
                        letters.push({
                            char: ch === ' ' ? ' ' : ch,
                            x: x, y: y,
                            growth: MIN_GROWTH
                        });
                    }
                }
                rebuildSpatialGrid();
            }
            
            function getBlendedColor(growth, char) {
                if (growth <= BLOOM_THRESHOLD) return baseGreen;
                let t = (growth - BLOOM_THRESHOLD) / (MAX_GROWTH - BLOOM_THRESHOLD);
                t = Math.min(1, Math.max(0, t));
                const flower = flowerColors[char] || flowerColors['$'] || color(255, 200, 100);
                return lerpColor(baseGreen, flower, t);
            }
            
            // update a letter near active pointers (click/touch hold)
            function updateLetterWithClick(letter, pointers) {
                let newGrowth = letter.growth * DECAY_FACTOR;
                let maxBoost = 0;
                
                for (let p of pointers) {
                    const dx = p.x - letter.x;
                    const dy = p.y - letter.y;
                    const distSq = dx*dx + dy*dy;
                    if (distSq < INFLUENCE_RADIUS * INFLUENCE_RADIUS) {
                        const dist = Math.sqrt(distSq);
                        let intensity = 5200 / (dist + 5);
                        if (intensity > maxBoost) maxBoost = intensity;
                    }
                }
                
                if (maxBoost > 0) {
                    newGrowth = Math.min(newGrowth + maxBoost, MAX_GROWTH);
                }
                newGrowth = Math.max(newGrowth, MIN_GROWTH);
                letter.growth = newGrowth;
            }
            
            function updateLetterFar(letter) {
                let newGrowth = letter.growth * DECAY_FACTOR;
                if (newGrowth < MIN_GROWTH) newGrowth = MIN_GROWTH;
                letter.growth = newGrowth;
            }
            
            function getAffectedIndices(pointers) {
                if (pointers.length === 0) return null;
                const affectedSet = new Set();
                const radiusCells = Math.ceil(INFLUENCE_RADIUS / GRID_CELL_SIZE) + 1;
                
                for (let p of pointers) {
                    const centerCellX = Math.floor(p.x / GRID_CELL_SIZE);
                    const centerCellY = Math.floor(p.y / GRID_CELL_SIZE);
                    for (let dx = -radiusCells; dx <= radiusCells; dx++) {
                        for (let dy = -radiusCells; dy <= radiusCells; dy++) {
                            const key = `${centerCellX + dx}:${centerCellY + dy}`;
                            const indices = gridCells.get(key);
                            if (indices) {
                                for (let idx of indices) affectedSet.add(idx);
                            }
                        }
                    }
                }
                return affectedSet;
            }
            
            function updateAllGrowths() {
                // active pointers ONLY when mouse/touch is held down (no hover)
                const pointers = [];
                
                // mouse: only if button is pressed
                if (mouseIsPressed && mouseX >= 0 && mouseX <= width && mouseY >= 0 && mouseY <= height) {
                    pointers.push({ x: mouseX, y: mouseY });
                }
                // touches: automatically only present while touching
                if (touches.length > 0) {
                    for (let t of touches) {
                        pointers.push({ x: t.x, y: t.y });
                    }
                }
                
                if (pointers.length === 0) {
                    // no active click/touch → decay all letters
                    for (let i = 0; i < letters.length; i++) {
                        let ng = letters[i].growth * DECAY_FACTOR;
                        if (ng < MIN_GROWTH) ng = MIN_GROWTH;
                        letters[i].growth = ng;
                    }
                    return;
                }
                
                const nearIndices = getAffectedIndices(pointers);
                if (nearIndices && nearIndices.size > 0) {
                    for (let idx of nearIndices) {
                        updateLetterWithClick(letters[idx], pointers);
                    }
                    for (let i = 0; i < letters.length; i++) {
                        if (!nearIndices.has(i)) {
                            updateLetterFar(letters[i]);
                        }
                    }
                } else {
                    for (let i = 0; i < letters.length; i++) {
                        updateLetterWithClick(letters[i], pointers);
                    }
                }
            }
            
            function drawLetters() {
                textFont(fontMain);
                textAlign(CENTER, CENTER);
                
                for (let letter of letters) {
                    const growth = letter.growth;
                    let scaleFactor = map(growth, MIN_GROWTH, MAX_GROWTH, 0.75, 1.35);
                    const col = getBlendedColor(growth, letter.char);
                    fill(col);
                    noStroke();
                    
                    push();
                    translate(letter.x, letter.y);
                    scale(scaleFactor);
                    textSize(32);
                    text(letter.char, 0, 0);
                    pop();
                }
            }
            
            function resizeMeadow() {
                resizeCanvas(windowWidth, windowHeight);
                background(BGCOLOR[0], BGCOLOR[1], BGCOLOR[2]);
                generateLetterGrid();
            }
            
            // ========== p5.js core ==========
            function setup() {
                const canvas = createCanvas(windowWidth, windowHeight);
                canvas.style('position', 'fixed').style('top', '0').style('left', '0').style('z-index', '1');
                pixelDensity(1);
                
                fontMain = 'monospace';
                textFont(fontMain);
                
                baseGreen = color(41, 157, 0);
                flowerColors = {
                    't': color(119, 239, 255),
                    'o': color(255, 187, 194),
                    'u': color(255, 170, 40),
                    'c': color(242, 18, 0),
                    'h': color(221, 255, 123),
                    'g': color(255, 255, 220),
                    'r': color(255, 229, 0),
                    'a': color(138, 97, 255),
                    '$': color(255, 110, 30),
                    's': color(227, 192, 255),
                    ' ': color(180, 230, 120)
                };
                
                generateLetterGrid();
                frameRate(60);
            }
            
            function draw() {
                background(BGCOLOR[0], BGCOLOR[1], BGCOLOR[2]);
                updateAllGrowths();
                drawLetters();
            }
            
            function windowResized() {
                resizeMeadow();
            }
            
            window.setup = setup;
            window.draw = draw;
            window.windowResized = windowResized;
        })();
    </script>
</body>
</html>
