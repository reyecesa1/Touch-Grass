<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>touchgra$$ — autumn ember field • warm & popping</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            touch-action: none;
        }

        body {
            min-height: 100vh;
            background: #2a2a1c;  /* deep charcoal-warm fallback */
            overflow-x: hidden;
            font-family: 'Fira Mono', 'Courier New', 'SF Mono', monospace;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            z-index: 1;
            pointer-events: auto;
            touch-action: none;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
</head>
<body>
<script>
(function(){
    // ============================================================
    //  AUTUMN EMBER BLOOM FIELD — "touchgra$$" 
    //  earthy, warm browns, terracotta, sage, raspberry, sunshine yellow
    //  each touch = fresh shuffle of autumn/warm/berry colors
    //  earthy green base that POPS, not washed
    // ============================================================

    // ----- CONFIGURATION -----------------------------------------
    // DEEP EARTHY BACKGROUND — charcoal meets forest floor
    const BGCOLOR = [35, 38, 28];      // deep mossy charcoal (earthy depth)
    const BASE_WORD = "touchgra$$";
    const REPEAT_COUNT = 30;
    const TEXT_PHRASE = BASE_WORD.repeat(REPEAT_COUNT);
    
    const BLOOM_THRESHOLD = 480;
    const MAX_GROWTH = 1000;
    const MIN_GROWTH = 1;
    
    // RIPPLE PHYSICS — warm, swelling ripple
    const RIPPLE_MAX_RADIUS = 430;
    const RIPPLE_DURATION_MS = 720;
    const RIPPLE_WIDTH = 68;
    const RIPPLE_STRENGTH = 9200;       // strong bloom pop
    
    // NATURAL DECAY — keeps field alive but fresh
    const DECAY_FACTOR = 0.975;
    
    // GRID — dense letter packing
    const GRID_CELL_SIZE = 140;
    const LETTER_SPACING_FACTOR = 0.92;
    const LINE_HEIGHT_FACTOR = 0.88;
    
    // ========== 🍂 AUTUMN / WARM / BERRY COLOR PALETTE ==========
    // earthy + poppy: warm browns, terracotta, olive green, sage, sandstone, muted rust
    // sunshine yellow, coral pink, ocean blue, mint green, fiery red, cloud dancer (soft warm white)
    // deep raspberry, berry pinks, charcoal grey
    // all high enough saturation to POP against earthy green
    const AUTUMN_PALETTE = {
        't': [165, 85, 55],     // terracotta (warm earth)
        'o': [210, 125, 70],    // sandstone / muted rust
        'u': [140, 100, 65],    // warm brown (chestnut)
        'c': [120, 100, 55],    // olive green (earthy pop)
        'h': [160, 140, 85],    // sage green (soft but lively)
        'g': [240, 210, 100],   // sunshine yellow (bold autumn sun)
        'r': [255, 140, 150],   // coral pink (warm & sweet)
        'a': [70, 160, 190],    // ocean blue (cool contrast, pops)
        '$': [80, 170, 110],    // mint green (fresh)
        's': [230, 75, 85]      // fiery red (strong autumn fire)
    };
    
    // additional berry & charcoal tones (will be shuffled into the mix)
    const BERRY_CHARCOAL = {
        'extra_raspberry': [175, 55, 95],   // deep raspberry
        'extra_berrypink': [210, 85, 120],  // berry pink
        'extra_charcoal': [80, 85, 90]      // warm charcoal grey
    };
    
    // we will merge and randomly assign to the 10 chars each time
    // so each touch gets fresh distribution of all these warm/autumn/berry tones
    
    // ----- GLOBAL STATE ------------------------------------------
    let letters = [];
    let gridCells = new Map();
    let baseGreen;                  // earthy base that pops
    let flowerColors = {};
    let fontMain = 'monospace';
    let cols, rows, cellW, cellH;
    let activeRipples = [];
    
    // ----- BUILD FULL COLOR POOL (warm autumn + berry + charcoal) --
    function buildFullColorPool() {
        // start with all autumn base colors
        let pool = Object.values(AUTUMN_PALETTE);
        // add berry and charcoal variations
        pool.push(BERRY_CHARCOAL.extra_raspberry);
        pool.push(BERRY_CHARCOAL.extra_berrypink);
        pool.push(BERRY_CHARCOAL.extra_charcoal);
        // also add cloud dancer (soft warm white/cream)
        pool.push([245, 235, 210]);   // cloud dancer (warm off-white)
        // add extra muted rust & sandstone depth
        pool.push([190, 110, 70]);    // deeper rust
        pool.push([100, 75, 55]);     // deep warm taupe
        return pool;
    }
    
    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }
    
    function randomizeColorAssignments() {
        const chars = Object.keys(AUTUMN_PALETTE);  // ['t','o','u','c','h','g','r','a','$','s']
        const colorPool = buildFullColorPool();
        // shuffle the pool so each touch gets a fresh mix of warm/earthy/berry tones
        const shuffledPool = shuffleArray([...colorPool]);
        // assign to each character (10 chars) from the shuffled pool (ensures variety)
        for (let i = 0; i < chars.length; i++) {
            const ch = chars[i];
            const rgb = shuffledPool[i % shuffledPool.length];
            flowerColors[ch] = color(rgb[0], rgb[1], rgb[2]);
        }
        // extra safety: ensure no two are identical? randomness is fine, creates organic pop
    }
    
    // ----- SPATIAL GRID (performance) ----------------------------
    function rebuildSpatialGrid() {
        gridCells.clear();
        for (let i = 0; i < letters.length; i++) {
            const l = letters[i];
            const cellX = Math.floor(l.x / GRID_CELL_SIZE);
            const cellY = Math.floor(l.y / GRID_CELL_SIZE);
            const key = `${cellX}:${cellY}`;
            if (!gridCells.has(key)) gridCells.set(key, []);
            gridCells.get(key).push(i);
        }
    }
    
    function getCandidateIndices(centerX, centerY, radius) {
        const minCellX = Math.floor((centerX - radius) / GRID_CELL_SIZE);
        const maxCellX = Math.floor((centerX + radius) / GRID_CELL_SIZE);
        const minCellY = Math.floor((centerY - radius) / GRID_CELL_SIZE);
        const maxCellY = Math.floor((centerY + radius) / GRID_CELL_SIZE);
        const candidates = new Set();
        for (let cx = minCellX; cx <= maxCellX; cx++) {
            for (let cy = minCellY; cy <= maxCellY; cy++) {
                const key = `${cx}:${cy}`;
                const indices = gridCells.get(key);
                if (indices) {
                    for (let idx of indices) candidates.add(idx);
                }
            }
        }
        return candidates;
    }
    
    // ----- DENSE LETTER GRID (full field, no gaps) ----------------
    function generateLetterGrid() {
        letters = [];
        textFont(fontMain);
        textSize(32);
        
        const sampleW = textWidth("W") * LETTER_SPACING_FACTOR;
        const sampleH = (textAscent() + textDescent()) * LINE_HEIGHT_FACTOR;
        
        cols = Math.floor(width / sampleW);
        rows = Math.floor(height / sampleH);
        if (cols < 24) cols = 24;
        if (rows < 18) rows = 18;
        
        cellW = width / cols;
        cellH = height / rows;
        
        let fullPattern = TEXT_PHRASE;
        while (fullPattern.length < cols * rows) {
            fullPattern += BASE_WORD;
        }
        
        let idx = 0;
        for (let row = 0; row < rows; row++) {
            for (let col = 0; col < cols; col++) {
                const ch = fullPattern[idx % fullPattern.length];
                idx++;
                const x = col * cellW + cellW * 0.5;
                const y = row * cellH + cellH * 0.5;
                letters.push({
                    char: ch,
                    x: x, y: y,
                    growth: MIN_GROWTH
                });
            }
        }
        rebuildSpatialGrid();
    }
    
    // ----- COLOR BLENDING: earthy green → autumn pop --------------
    function getBlendedColor(growth, char) {
        if (growth <= BLOOM_THRESHOLD) return baseGreen;
        let t = (growth - BLOOM_THRESHOLD) / (MAX_GROWTH - BLOOM_THRESHOLD);
        t = Math.min(1, Math.max(0, t));
        // slight easing to make colors feel "popping"
        t = Math.pow(t, 0.85);
        const flower = flowerColors[char] || flowerColors['g'] || color(220, 180, 80);
        return lerpColor(baseGreen, flower, t);
    }
    
    // ----- RIPPLE BOOST (intense growth wave) --------------------
    function applyRippleBoost(ripple, nowMs) {
        const elapsed = (nowMs - ripple.startTime) / RIPPLE_DURATION_MS;
        if (elapsed >= 1.0) return false;
        
        const currentRadius = RIPPLE_MAX_RADIUS * elapsed;
        const timeFactor = 1.0 - elapsed;
        const maxCheckRadius = RIPPLE_MAX_RADIUS + RIPPLE_WIDTH;
        const candidates = getCandidateIndices(ripple.x, ripple.y, maxCheckRadius);
        
        for (let idx of candidates) {
            const l = letters[idx];
            const dx = l.x - ripple.x;
            const dy = l.y - ripple.y;
            const dist = Math.hypot(dx, dy);
            const distToRing = Math.abs(dist - currentRadius);
            if (distToRing < RIPPLE_WIDTH) {
                const ringFactor = 1.0 - (distToRing / RIPPLE_WIDTH);
                let intensity = RIPPLE_STRENGTH * ringFactor * timeFactor;
                if (intensity > 0) {
                    let newGrowth = Math.min(l.growth + intensity, MAX_GROWTH);
                    l.growth = newGrowth;
                }
            }
        }
        return true;
    }
    
    // ----- NATURAL DECAY (subtle fade, keeps field fresh) --------
    function decayAllLetters() {
        for (let i = 0; i < letters.length; i++) {
            let ng = letters[i].growth * DECAY_FACTOR;
            if (ng < MIN_GROWTH) ng = MIN_GROWTH;
            letters[i].growth = ng;
        }
    }
    
    // ----- ADD RIPPLE + RESHUFFLE COLORS (fresh autumn mix each touch) --
    function addBloomRipple(x, y) {
        // each interaction = new random assignment of warm/berry/earthy tones
        randomizeColorAssignments();
        activeRipples.push({
            x: x,
            y: y,
            startTime: millis()
        });
        if (activeRipples.length > 24) activeRipples.shift();
    }
    
    // ----- UPDATE RIPPLES & DECAY ---------------------------------
    function updateBlooms() {
        const now = millis();
        for (let i = activeRipples.length-1; i >= 0; i--) {
            const stillActive = applyRippleBoost(activeRipples[i], now);
            if (!stillActive) activeRipples.splice(i,1);
        }
        decayAllLetters();
    }
    
    // ----- DRAW THE DENSE FIELD (with scale & bloom pop) ---------
    function drawLetters() {
        textFont(fontMain);
        textAlign(CENTER, CENTER);
        for (let letter of letters) {
            const growth = letter.growth;
            let scaleFactor = map(growth, MIN_GROWTH, MAX_GROWTH, 0.78, 1.48);
            const col = getBlendedColor(growth, letter.char);
            fill(col);
            noStroke();
            push();
            translate(letter.x, letter.y);
            scale(scaleFactor);
            textSize(32);
            text(letter.char, 0, 0);
            pop();
        }
    }
    
    // ----- RESIZE HANDLER (maintain density) ---------------------
    function resizeMeadow() {
        resizeCanvas(windowWidth, windowHeight);
        background(BGCOLOR[0], BGCOLOR[1], BGCOLOR[2]);
        generateLetterGrid();
        activeRipples = [];
    }
    
    // ========== P5.JS SETUP ======================================
    function setup() {
        const canvas = createCanvas(windowWidth, windowHeight);
        canvas.style('position', 'fixed').style('top', '0').style('left', '0').style('z-index', '1');
        canvas.style('touch-action', 'none');
        pixelDensity(1);
        
        fontMain = 'monospace';
        textFont(fontMain);
        
        // EARTHY GREEN BASE — vibrant olive with warmth (not washed, deep but lively)
        // blends beautifully with terracotta, rust, raspberry, sunshine yellow
        baseGreen = color(85, 115, 65);   // rich sage-meets-olive, earthy and popping
        
        randomizeColorAssignments();
        generateLetterGrid();
        frameRate(60);
    }
    
    function draw() {
        // deep earthy charcoal background (adds contrast to make colors pop)
        background(BGCOLOR[0], BGCOLOR[1], BGCOLOR[2]);
        updateBlooms();
        drawLetters();
    }
    
    // ----- EVENT HANDLERS (mouse + touch) ------------------------
    function mousePressed() {
        if (mouseX >= 0 && mouseX <= width && mouseY >= 0 && mouseY <= height) {
            addBloomRipple(mouseX, mouseY);
        }
        return false;
    }
    
    function touchStarted() {
        for (let t of touches) {
            if (t.x >= 0 && t.x <= width && t.y >= 0 && t.y <= height) {
                addBloomRipple(t.x, t.y);
            }
        }
        return false;
    }
    
    function windowResized() {
        resizeMeadow();
    }
    
    window.setup = setup;
    window.draw = draw;
    window.windowResized = windowResized;
    window.mousePressed = mousePressed;
    window.touchStarted = touchStarted;
    
    document.addEventListener('contextmenu', (e) => {
        if (e.target.tagName === 'CANVAS') e.preventDefault();
    });
})();
</script>
</body>
</html>
