<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>touchgra$$ — slow bloom • progressive ripple</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            touch-action: none;
        }

        body {
            min-height: 100vh;
            background: #2a4a1a;
            overflow-x: hidden;
            font-family: 'Fira Mono', 'Courier New', 'SF Mono', monospace;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            z-index: 1;
            pointer-events: auto;
            touch-action: none;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
</head>
<body>
<script>
(function(){
    // ============================================================
    //  SPRING/SUMMER BLOOM — progressive ripple (starts tiny)
    //  each click: only 1-2 letters bloom first, then ripples outward
    //  earthy green base + vibrant seasonal colors
    // ============================================================

    // ----- CONFIGURATION -----------------------------------------
    const BGCOLOR = [38, 72, 32];      // fresh forest floor
    const BASE_WORD = "touchgra$$";
    const REPEAT_COUNT = 30;
    const TEXT_PHRASE = BASE_WORD.repeat(REPEAT_COUNT);
    
    const BLOOM_THRESHOLD = 480;
    const MAX_GROWTH = 1000;
    const MIN_GROWTH = 1;
    
    // RIPPLE PHYSICS — progressive, starts very small
    const RIPPLE_MAX_RADIUS = 520;      // grows across entire screen
    const RIPPLE_DURATION_MS = 880;     // slower, more organic expansion
    const RIPPLE_WIDTH = 16;            // narrow ring → starts with 1-2 letters
    const RIPPLE_STRENGTH = 15000;      // strong boost to make each letter pop
    
    const DECAY_FACTOR = 0.975;
    
    // GRID
    const GRID_CELL_SIZE = 140;
    const LETTER_SPACING_FACTOR = 0.92;
    const LINE_HEIGHT_FACTOR = 0.88;
    
    // ========== SPRING + SUMMER VIBRANT PALETTE ==========
    const SEASONAL_PALETTE = {
        't': [255, 100, 130],    // watermelon pink
        'o': [255, 160, 70],     // marigold
        'u': [70, 210, 150],     // fresh mint
        'c': [255, 215, 70],     // lemon yellow
        'h': [80, 200, 255],     // sky blue
        'g': [255, 90, 160],     // hot pink
        'r': [255, 130, 90],     // coral
        'a': [130, 90, 255],     // lavender
        '$': [50, 220, 180],     // turquoise
        's': [255, 70, 70]       // poppy red
    };
    
    const SPRING_BOOST = {
        'peach': [255, 180, 110],
        'lime': [160, 240, 70],
        'baby_blue': [140, 210, 255],
        'apricot': [255, 140, 80],
        'berry_punch': [220, 70, 130]
    };
    
    // ----- GLOBAL STATE ------------------------------------------
    let letters = [];
    let gridCells = new Map();
    let baseGreen;
    let flowerColors = {};
    let fontMain = 'monospace';
    let cols, rows, cellW, cellH;
    let activeRipples = [];
    
    // ----- COLOR POOL & SHUFFLE ----------------------------------
    function buildFullColorPool() {
        let pool = Object.values(SEASONAL_PALETTE);
        pool.push(SPRING_BOOST.peach);
        pool.push(SPRING_BOOST.lime);
        pool.push(SPRING_BOOST.baby_blue);
        pool.push(SPRING_BOOST.apricot);
        pool.push(SPRING_BOOST.berry_punch);
        pool.push([255, 240, 80]);   // daffodil
        pool.push([100, 230, 120]);  // fresh spring green
        pool.push([255, 200, 200]);  // blush pink
        return pool;
    }
    
    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }
    
    function randomizeColorAssignments() {
        const chars = Object.keys(SEASONAL_PALETTE);
        const colorPool = buildFullColorPool();
        const shuffledPool = shuffleArray([...colorPool]);
        for (let i = 0; i < chars.length; i++) {
            const ch = chars[i];
            const rgb = shuffledPool[i % shuffledPool.length];
            flowerColors[ch] = color(rgb[0], rgb[1], rgb[2]);
        }
    }
    
    // ----- SPATIAL GRID ------------------------------------------
    function rebuildSpatialGrid() {
        gridCells.clear();
        for (let i = 0; i < letters.length; i++) {
            const l = letters[i];
            const cellX = Math.floor(l.x / GRID_CELL_SIZE);
            const cellY = Math.floor(l.y / GRID_CELL_SIZE);
            const key = `${cellX}:${cellY}`;
            if (!gridCells.has(key)) gridCells.set(key, []);
            gridCells.get(key).push(i);
        }
    }
    
    function getCandidateIndices(centerX, centerY, radius) {
        const minCellX = Math.floor((centerX - radius) / GRID_CELL_SIZE);
        const maxCellX = Math.floor((centerX + radius) / GRID_CELL_SIZE);
        const minCellY = Math.floor((centerY - radius) / GRID_CELL_SIZE);
        const maxCellY = Math.floor((centerY + radius) / GRID_CELL_SIZE);
        const candidates = new Set();
        for (let cx = minCellX; cx <= maxCellX; cx++) {
            for (let cy = minCellY; cy <= maxCellY; cy++) {
                const key = `${cx}:${cy}`;
                const indices = gridCells.get(key);
                if (indices) {
                    for (let idx of indices) candidates.add(idx);
                }
            }
        }
        return candidates;
    }
    
    // ----- DENSE LETTER GRID -------------------------------------
    function generateLetterGrid() {
        letters = [];
        textFont(fontMain);
        textSize(32);
        
        const sampleW = textWidth("W") * LETTER_SPACING_FACTOR;
        const sampleH = (textAscent() + textDescent()) * LINE_HEIGHT_FACTOR;
        
        cols = Math.floor(width / sampleW);
        rows = Math.floor(height / sampleH);
        if (cols < 24) cols = 24;
        if (rows < 18) rows = 18;
        
        cellW = width / cols;
        cellH = height / rows;
        
        let fullPattern = TEXT_PHRASE;
        while (fullPattern.length < cols * rows) {
            fullPattern += BASE_WORD;
        }
        
        let idx = 0;
        for (let row = 0; row < rows; row++) {
            for (let col = 0; col < cols; col++) {
                const ch = fullPattern[idx % fullPattern.length];
                idx++;
                const x = col * cellW + cellW * 0.5;
                const y = row * cellH + cellH * 0.5;
                letters.push({
                    char: ch,
                    x: x, y: y,
                    growth: MIN_GROWTH
                });
            }
        }
        rebuildSpatialGrid();
    }
    
    // ----- COLOR BLENDING ----------------------------------------
    function getBlendedColor(growth, char) {
        if (growth <= BLOOM_THRESHOLD) return baseGreen;
        let t = (growth - BLOOM_THRESHOLD) / (MAX_GROWTH - BLOOM_THRESHOLD);
        t = Math.min(1, Math.max(0, t));
        t = Math.pow(t, 0.85);
        const flower = flowerColors[char] || flowerColors['g'] || color(255, 180, 100);
        return lerpColor(baseGreen, flower, t);
    }
    
    // ----- PROGRESSIVE RIPPLE (starts tiny, expands outward) ----
    function applyRippleBoost(ripple, nowMs) {
        const elapsed = (nowMs - ripple.startTime) / RIPPLE_DURATION_MS;
        if (elapsed >= 1.0) return false;
        
        // current radius of the ripple wave (grows from 0 to max)
        const currentRadius = RIPPLE_MAX_RADIUS * elapsed;
        // the "wave front" is a thin ring: we affect letters within RIPPLE_WIDTH of currentRadius
        const maxCheckRadius = currentRadius + RIPPLE_WIDTH;
        const candidates = getCandidateIndices(ripple.x, ripple.y, maxCheckRadius);
        
        for (let idx of candidates) {
            const l = letters[idx];
            const dx = l.x - ripple.x;
            const dy = l.y - ripple.y;
            const dist = Math.hypot(dx, dy);
            // distance to the ring center
            const distToRing = Math.abs(dist - currentRadius);
            if (distToRing < RIPPLE_WIDTH) {
                // intensity peaks at the exact ring and fades towards edges
                const ringFactor = 1.0 - (distToRing / RIPPLE_WIDTH);
                // time factor: strongest near the start of the wave? 
                // we want consistent push across the expansion, but slight decay is fine
                const timeFactor = 1.0 - (elapsed * 0.4); // gentle decay over time
                let intensity = RIPPLE_STRENGTH * ringFactor * timeFactor;
                if (intensity > 0) {
                    let newGrowth = Math.min(l.growth + intensity, MAX_GROWTH);
                    l.growth = newGrowth;
                }
            }
        }
        return true;
    }
    
    // ----- NATURAL DECAY -----------------------------------------
    function decayAllLetters() {
        for (let i = 0; i < letters.length; i++) {
            let ng = letters[i].growth * DECAY_FACTOR;
            if (ng < MIN_GROWTH) ng = MIN_GROWTH;
            letters[i].growth = ng;
        }
    }
    
    // ----- ADD RIPPLE (fresh colors each touch) ------------------
    function addBloomRipple(x, y) {
        randomizeColorAssignments();
        activeRipples.push({
            x: x,
            y: y,
            startTime: millis()
        });
        if (activeRipples.length > 24) activeRipples.shift();
    }
    
    // ----- UPDATE ------------------------------------------------
    function updateBlooms() {
        const now = millis();
        for (let i = activeRipples.length-1; i >= 0; i--) {
            const stillActive = applyRippleBoost(activeRipples[i], now);
            if (!stillActive) activeRipples.splice(i,1);
        }
        decayAllLetters();
    }
    
    // ----- DRAW FIELD --------------------------------------------
    function drawLetters() {
        textFont(fontMain);
        textAlign(CENTER, CENTER);
        for (let letter of letters) {
            const growth = letter.growth;
            let scaleFactor = map(growth, MIN_GROWTH, MAX_GROWTH, 0.78, 1.48);
            const col = getBlendedColor(growth, letter.char);
            fill(col);
            noStroke();
            push();
            translate(letter.x, letter.y);
            scale(scaleFactor);
            textSize(32);
            text(letter.char, 0, 0);
            pop();
        }
    }
    
    // ----- RESIZE ------------------------------------------------
    function resizeMeadow() {
        resizeCanvas(windowWidth, windowHeight);
        background(BGCOLOR[0], BGCOLOR[1], BGCOLOR[2]);
        generateLetterGrid();
        activeRipples = [];
    }
    
    // ========== P5.JS ===========================================
    function setup() {
        const canvas = createCanvas(windowWidth, windowHeight);
        canvas.style('position', 'fixed').style('top', '0').style('left', '0').style('z-index', '1');
        canvas.style('touch-action', 'none');
        pixelDensity(1);
        
        fontMain = 'monospace';
        textFont(fontMain);
        
        // earthy green base — rich and lively
        baseGreen = color(75, 125, 60);
        
        randomizeColorAssignments();
        generateLetterGrid();
        frameRate(60);
    }
    
    function draw() {
        background(BGCOLOR[0], BGCOLOR[1], BGCOLOR[2]);
        updateBlooms();
        drawLetters();
    }
    
    // ----- EVENT HANDLERS ----------------------------------------
    function mousePressed() {
        if (mouseX >= 0 && mouseX <= width && mouseY >= 0 && mouseY <= height) {
            addBloomRipple(mouseX, mouseY);
        }
        return false;
    }
    
    function touchStarted() {
        for (let t of touches) {
            if (t.x >= 0 && t.x <= width && t.y >= 0 && t.y <= height) {
                addBloomRipple(t.x, t.y);
            }
        }
        return false;
    }
    
    function windowResized() {
        resizeMeadow();
    }
    
    window.setup = setup;
    window.draw = draw;
    window.windowResized = windowResized;
    window.mousePressed = mousePressed;
    window.touchStarted = touchStarted;
    
    document.addEventListener('contextmenu', (e) => {
        if (e.target.tagName === 'CANVAS') e.preventDefault();
    });
})();
</script>
</body>
</html>
